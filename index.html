<script>
// ── CREDENCIALES ─────────────────────────────────────
const SUPABASE_URL = 'https://vkjirtcqyexoyrpiflgu.supabase.co';  // <- cambia esto
const SUPABASE_KEY = 'sb_publishable_92rFDjEPcxw9CfMRMJWN6A_qNUdfAdJ';               // <- cambia esto

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true, storage:localStorage }
});

// ── CONSTANTES ───────────────────────────────────────
const PAIRS      = ['XAUUSD','NAS100','EURUSD','GBPUSD','US30','SPX500','USDJPY','BTCUSD','ETHUSDT'];
const SETUPS     = ['Liquidity Sweep + FVG','Order Block + BOS','CHOCH + FVG','Liquidity Sweep + OB','Fair Value Gap','Market Structure Break','Inducement + Sweep','Custom'];
const SESSIONS   = ['Londres','Nueva York','Asia','Londres/NY Overlap'];
const TIMEFRAMES = ['M1','M5','M15','M30','H1','H4','D1'];
const ERROR_TYPES= ['FOMO','Revenge Trading','Entrada Temprana','Entrada Tardía','Ignorar HTF','Overtrading','Sin Checklist','Gestión Pobre'];
const HABIT_CATS = ['Físico','Mental','Rutina','Trading','Otro'];
const DEFAULT_CL = [
  {id:1,label:'Liquidez tomada',active:true},{id:2,label:'BOS confirmado',active:true},
  {id:3,label:'CHOCH confirmado',active:true},{id:4,label:'FVG presente',active:true},
  {id:5,label:'Order Block presente',active:true},{id:6,label:'Bias HTF confirmado',active:true},
  {id:7,label:'Zona premium/discount',active:true},{id:8,label:'Sesión correcta',active:true},
  {id:9,label:'Riesgo controlado',active:true},
];

// ── ESTADO ───────────────────────────────────────────
let S = {
  user:null, trades:[], checklist:[...DEFAULT_CL],
  weeklyPlan:null, apiKey:'', equityChart:null,
  currentPage:'dashboard', habits:[], habitLogs:{}
};

// ── AUTH ─────────────────────────────────────────────
let authMode='login';

function switchAuthTab(m){
  authMode=m;
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(m==='login'&&i===0)||(m==='register'&&i===1)));
  document.getElementById('auth-btn').textContent=m==='login'?'Entrar':'Crear cuenta';
  document.getElementById('auth-error').style.display='none';
}

async function handleAuth(){
  const email=document.getElementById('auth-email').value.trim();
  const pwd=document.getElementById('auth-password').value;
  if(!email||!pwd){showAuthError('Completa email y contraseña');return;}
  const btn=document.getElementById('auth-btn');btn.textContent='Cargando...';btn.disabled=true;
  try{
    const res=authMode==='login'
      ?await sb.auth.signInWithPassword({email,password:pwd})
      :await sb.auth.signUp({email,password:pwd});
    if(res.error)throw res.error;
  }catch(e){
    const msgs={'Invalid login credentials':'Email o contraseña incorrectos','User already registered':'Email ya registrado','Password should be at least 6 characters':'Mínimo 6 caracteres','Email not confirmed':'Confirma tu email'};
    showAuthError(msgs[e.message]||e.message);
    btn.disabled=false;btn.textContent=authMode==='login'?'Entrar':'Crear cuenta';
  }
}

function showAuthError(msg){const el=document.getElementById('auth-error');el.textContent=msg;el.style.display='block';}

async function handleLogout(){
  try{await sb.auth.signOut();}catch(e){}
  S={user:null,trades:[],checklist:[...DEFAULT_CL],weeklyPlan:null,apiKey:localStorage.getItem('ef_key')||'',equityChart:null,currentPage:'dashboard',habits:[],habitLogs:{}};
  document.getElementById('app').style.display='none';
  document.getElementById('auth-screen').style.display='flex';
  document.getElementById('auth-email').value='';
  document.getElementById('auth-password').value='';
  document.getElementById('auth-error').style.display='none';
  document.getElementById('auth-btn').textContent='Entrar';
  document.getElementById('auth-btn').disabled=false;
  switchAuthTab('login');
}

sb.auth.onAuthStateChange(async(event,session)=>{
  if(event==='SIGNED_OUT'||!session){
    document.getElementById('app').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
    return;
  }
  if(session?.user){
    S.user=session.user;S.apiKey=localStorage.getItem('ef_key')||'';
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    document.getElementById('user-avatar').textContent=session.user.email[0].toUpperCase();
    document.getElementById('user-email-display').textContent=session.user.email.split('@')[0];
    await loadUserData();
    showPage('dashboard');
  }
});

// ── CARGA DE DATOS ───────────────────────────────────
async function loadUserData(){
  document.getElementById('main-content').innerHTML='<div class="loading"><div class="spinner"></div> Cargando tus datos...</div>';
  try{
    const {data:trades,error}=await sb.from('trades').select('*').eq('user_id',S.user.id).order('created_at',{ascending:true});
    if(error)throw error;
    S.trades=(trades||[]).map(t=>({...t,result:parseFloat(t.result),checklist:t.checklist||{},errors:t.errors||[],feedback:t.feedback||null}));
  }catch(e){console.error(e);S.trades=[];}
  try{
    const {data:cfg}=await sb.from('checklist_config').select('items').eq('user_id',S.user.id).maybeSingle();
    if(cfg?.items?.length)S.checklist=cfg.items;
  }catch(e){}
  try{
    const {data:plans}=await sb.from('weekly_plans').select('plan').eq('user_id',S.user.id).order('created_at',{ascending:false}).limit(1);
    if(plans?.length)S.weeklyPlan=plans[0].plan;
  }catch(e){}
  try{
    const {data:habits}=await sb.from('habits').select('*').eq('user_id',S.user.id).order('created_at',{ascending:true});
    S.habits=habits||[];
  }catch(e){S.habits=[];}
  try{
    const today=new Date().toISOString().split('T')[0];
    const weekAgo=new Date(Date.now()-7*86400000).toISOString().split('T')[0];
    const {data:logs}=await sb.from('habit_logs').select('*').eq('user_id',S.user.id).gte('log_date',weekAgo);
    S.habitLogs={};
    (logs||[]).forEach(l=>{const k=`${l.habit_id}_${l.log_date}`;S.habitLogs[k]=l.done;});
  }catch(e){S.habitLogs={};}
}

// ── SUPABASE HELPERS ─────────────────────────────────
async function saveTrade(t){
  const {data,error}=await sb.from('trades').insert({
    user_id:S.user.id,pair:t.pair,direction:t.direction,result:t.result,rr:t.result,
    setup:t.setup,session:t.session,timeframe:t.timeframe,emotion:t.emotion,
    confidence:t.confidence,stress:t.stress,notes:t.notes,checklist:t.checklist,
    score:null,errors:[],feedback:null,screenshot_url:t.screenshot_url||null
  }).select().single();
  if(error){console.error(error);showToast('Error guardando trade','warn');return null;}
  return data;
}
async function updateTradeAI(id,score,errors,feedback){
  await sb.from('trades').update({score,errors,feedback}).eq('id',id).eq('user_id',S.user.id);
}
async function deleteTrade(id){await sb.from('trades').delete().eq('id',id).eq('user_id',S.user.id);}
async function saveChecklistCfg(){
  await sb.from('checklist_config').upsert({user_id:S.user.id,items:S.checklist},{onConflict:'user_id'});
}
async function saveWeeklyPlan(plan){
  const today=new Date().toISOString().split('T')[0];
  await sb.from('weekly_plans').insert({user_id:S.user.id,week_start:today,plan});
}
async function uploadScreenshot(file){
  if(!file)return null;
  const ext=file.name.split('.').pop();
  const path=`${S.user.id}/${Date.now()}.${ext}`;
  const {error}=await sb.storage.from('screenshots').upload(path,file,{upsert:true});
  if(error){console.error(error);showToast('Error subiendo imagen','warn');return null;}
  const {data}=sb.storage.from('screenshots').getPublicUrl(path);
  return data.publicUrl;
}

// ── STATS ────────────────────────────────────────────
function calcStats(){
  const t=S.trades;
  if(!t.length)return{pnl:0,wr:0,rr:0,weekPnl:0,winStreak:0,loseStreak:0,bestSetup:'-',bestSession:'-',count:0};
  const wins=t.filter(x=>x.result>0);
  const total=t.reduce((a,b)=>a+b.result,0);
  const wr=Math.round(wins.length/t.length*100);
  const rr=+(total/t.length).toFixed(2);
  const wStart=new Date(Date.now()-7*86400000);
  const weekPnl=t.filter(x=>new Date(x.created_at)>=wStart).reduce((a,b)=>a+b.result,0);
  let ws=0,ls=0,cW=0,cL=0;
  for(let i=t.length-1;i>=0;i--){
    if(t[i].result>0){cW++;cL=0}else{cL++;cW=0}
    if(cW>ws)ws=cW;if(cL>ls)ls=cL;
  }
  const sm={};t.forEach(x=>{sm[x.setup]=(sm[x.setup]||[]);sm[x.setup].push(x.result)});
  let bS='-',bSR=-999;
  Object.entries(sm).forEach(([k,v])=>{const a=v.reduce((a,b)=>a+b,0)/v.length;if(a>bSR){bSR=a;bS=k}});
  const se={};t.forEach(x=>{se[x.session]=(se[x.session]||[]);se[x.session].push(x.result)});
  let bSe='-',bSeR=-999;
  Object.entries(se).forEach(([k,v])=>{const a=v.reduce((a,b)=>a+b,0)/v.length;if(a>bSeR){bSeR=a;bSe=k}});
  return{pnl:+total.toFixed(2),wr,rr,weekPnl:+weekPnl.toFixed(2),winStreak:ws,loseStreak:ls,bestSetup:bS,bestSession:bSe,count:t.length};
}
function calcErrors(){
  const c={};ERROR_TYPES.forEach(e=>c[e]=0);
  S.trades.forEach(t=>(t.errors||[]).forEach(e=>{if(c[e]!==undefined)c[e]++}));
  return c;
}
function calcPatterns(){
  const t=S.trades;if(t.length<3)return[];
  const p=[];
  const sm={};t.forEach(x=>{sm[x.session]=(sm[x.session]||[]);sm[x.session].push(x.result)});
  let wS=null,wA=999;
  Object.entries(sm).forEach(([k,v])=>{const a=v.reduce((a,b)=>a+b,0)/v.length;if(a<wA&&v.length>1){wA=a;wS=k}});
  if(wS&&wA<0)p.push({type:'danger',text:`Tu sesión más débil es ${wS} con ${wA.toFixed(1)}R de media`});
  const sp={};t.forEach(x=>{sp[x.setup]=(sp[x.setup]||[]);sp[x.setup].push(x.result)});
  let bS=null,bA=-999;
  Object.entries(sp).forEach(([k,v])=>{const a=v.reduce((a,b)=>a+b,0)/v.length;if(a>bA&&v.length>1){bA=a;bS=k}});
  if(bS)p.push({type:'green',text:`Setup más rentable: "${bS}" con +${bA.toFixed(1)}R de media`});
  const nc=t.filter(x=>Object.values(x.checklist||{}).filter(v=>!v).length>3);
  if(nc.length>1){const wr=nc.filter(x=>x.result>0).length/nc.length;if(wr<0.4)p.push({type:'danger',text:`Pierdes dinero sin checklist (${Math.round(wr*100)}% WR)`});}
  for(let i=1;i<t.length;i++){if(t[i-1].result<0&&(t[i].errors||[]).includes('Revenge Trading')){p.push({type:'warn',text:'Haces revenge trading después de pérdidas'});break;}}
  const le=t.filter(x=>x.emotion<=4);
  if(le.length>1){const a=le.reduce((a,b)=>a+b.result,0)/le.length;if(a<0)p.push({type:'warn',text:`Emoción baja (≤4) → PnL medio ${a.toFixed(1)}R`});}
  return p;
}

// ── EQUITY ───────────────────────────────────────────
function drawEquity(id){
  const canvas=document.getElementById(id);if(!canvas)return;
  if(S.equityChart){S.equityChart.destroy();S.equityChart=null;}
  const t=[...S.trades].sort((a,b)=>a.created_at>b.created_at?1:-1);
  let cum=0;const labels=[],data=[];
  t.forEach(x=>{cum+=x.result;labels.push(x.created_at?.slice(5,10)||'');data.push(+cum.toFixed(2))});
  if(!labels.length){labels.push('Inicio');data.push(0);}
  const pos=data[data.length-1]>=0;
  const color=pos?'#34d399':'#f87171';
  S.equityChart=new Chart(canvas,{
    type:'line',
    data:{labels,datasets:[{data,borderColor:color,backgroundColor:pos?'rgba(52,211,153,0.06)':'rgba(248,113,113,0.06)',borderWidth:1.5,fill:true,tension:0.35,pointRadius:2.5,pointBackgroundColor:color}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw}R`},backgroundColor:'#222228',titleColor:'#a09db8',bodyColor:'#f0eff4',borderColor:'#35353f',borderWidth:1}},scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#5e5c72',font:{size:10,family:'Geist Mono'}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#5e5c72',font:{size:10,family:'Geist Mono'},callback:v=>v+'R'}}}}
  });
}

// ── ROUTER ───────────────────────────────────────────
function showPage(page){
  S.currentPage=page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const b=document.getElementById('nav-'+page);if(b)b.classList.add('active');
  const pages={dashboard:renderDashboard,trades:renderTrades,analisis:renderAnalisis,plan:renderPlan,habitos:renderHabitos,config:renderConfig};
  document.getElementById('main-content').innerHTML='';
  if(pages[page])pages[page]();
}

  </div>
  <div class="grid-4" style="margin-bottom:14px">
    <div class="metric"><div class="metric-label">PnL Total</div><div class="metric-value ${s.pnl>=0?'pos':'neg'}">${s.pnl>=0?'+':''}${s.pnl}R</div><div class="metric-sub">${s.count} trades registrados</div></div>
    <div class="metric"><div class="metric-label">Win Rate</div><div class="metric-value ${s.wr>=50?'pos':'neg'}">${s.wr}%</div><div class="metric-sub">Histórico completo</div></div>
    <div class="metric"><div class="metric-label">RR Medio</div><div class="metric-value ${s.rr>=0?'pos':'neg'}">${s.rr>=0?'+':''}${s.rr}R</div><div class="metric-sub">Por trade</div></div>
    <div class="metric"><div class="metric-label">Esta semana</div><div class="metric-value ${s.weekPnl>=0?'pos':'neg'}">${s.weekPnl>=0?'+':''}${s.weekPnl}R</div><div class="metric-sub">Últimos 7 días</div></div>
  </div>
  <div class="grid-4" style="margin-bottom:14px">
    <div class="metric"><div class="metric-label">Racha positiva</div><div class="metric-value pos">${s.winStreak}</div></div>
    <div class="metric"><div class="metric-label">Racha negativa</div><div class="metric-value neg">${s.loseStreak}</div></div>
    <div class="metric"><div class="metric-label">Mejor Setup</div><div class="metric-value" style="font-size:12px;color:var(--lila);line-height:1.4;margin-top:4px">${s.bestSetup}</div></div>
    <div class="metric"><div class="metric-label">Mejor Sesión</div><div class="metric-value" style="font-size:16px;color:var(--lila)">${s.bestSession}</div></div>
  </div>
  <div class="grid-2" style="margin-bottom:14px">
    <div class="card">
      <div class="card-header"><span class="card-title">Equity Curve</span></div>
      <div class="chart-area" style="height:190px"><canvas id="eq-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-title">Patrones detectados</span></div>
      ${calcPatterns().length?calcPatterns().map(p=>`<div class="insight-card ${p.type==='danger'?'danger':p.type==='warn'?'warn':''}">${p.text}</div>`).join(''):'<div class="empty" style="padding:24px 0"><span class="empty-icon">🔍</span><div class="empty-sub">Necesitas más trades para detectar patrones</div></div>'}
    </div>
  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">Últimos trades</span><button class="btn btn-ghost btn-sm" onclick="showPage('trades')">Ver todos</button></div>

// ── TRADES PAGE ──────────────────────────────────────
function renderTrades(){
  document.getElementById('main-content').innerHTML=`
  <div class="section-header">
    <div><h1>Trades</h1><p class="page-sub">${S.trades.length} registros</p></div>
    <button class="btn btn-primary" onclick="openAddTrade()"><i class="ti ti-plus"></i> Nuevo Trade</button>
  </div>
  ${renderTradeList([...S.trades].reverse())}`;
}

function renderTradeList(trades){
  if(!trades.length)return`<div class="empty"><span class="empty-icon">📋</span><div class="empty-title">Sin trades todavía</div><div class="empty-sub">Registra tu primer trade</div></div>`;
  return trades.map(t=>`
  <div class="trade-row" onclick="openTradeDetail(${t.id})">
    <div class="trade-pair">${t.pair}</div>
    <div class="trade-dir"><span class="tag ${t.direction==='Compra'?'tag-green':'tag-red'}">${t.direction==='Compra'?'↑ Long':'↓ Short'}</span></div>
    <div class="trade-result ${t.result>=0?'pos':'neg'}">${t.result>=0?'+':''}${t.result}R</div>
    <div class="trade-meta">${t.session} · ${t.timeframe} · ${(t.setup||'').substring(0,24)}${(t.setup||'').length>24?'...':''}</div>
    <div style="color:var(--text3);font-size:11px;font-family:'Geist Mono',monospace">${t.created_at?.slice(0,10)||''}</div>
    ${t.screenshot_url?'<i class="ti ti-photo" style="color:var(--text3);font-size:13px"></i>':''}
    <div class="score-circle" style="background:${t.score>=70?'var(--green-dim)':t.score>=40?'var(--amber-dim)':'var(--red-dim)'};color:${t.score>=70?'var(--green)':t.score>=40?'var(--amber)':'var(--red)'}">${t.score||'—'}</div>
  </div>`).join('');
}

function openAddTrade(){

  const m=document.createElement('div');m.className='modal-overlay';m.id='add-modal';

function previewImage(input){

function selectEmotion(v){selectedEmotion=v;document.querySelectorAll('.emotion-btn').forEach(b=>b.classList.toggle('selected',parseInt(b.dataset.v)===v));}
function toggleCheck(id){

async function submitTrade(){
  const result=parseFloat(document.getElementById('t-result')?.value);
  if(isNaN(result)){showToast('Introduce el resultado del trade','warn');return;}
  const btn=document.getElementById('save-btn');
  btn.innerHTML='<div class="spinner"></div> Guardando...';btn.disabled=true;
  let screenshot_url=null;
  if(selectedImageFile){showToast('Subiendo imagen...');screenshot_url=await uploadScreenshot(selectedImageFile);}
  const trade={
    direction:document.getElementById('t-dir').value,pair:document.getElementById('t-pair').value,
    result,setup:document.getElementById('t-setup').value,session:document.getElementById('t-session').value,
    timeframe:document.getElementById('t-tf').value,emotion:selectedEmotion,
    confidence:parseInt(document.getElementById('t-conf').value),stress:parseInt(document.getElementById('t-stress').value),
    notes:document.getElementById('t-notes').value,checklist:{...tradeCheckState},screenshot_url,
  };
  const saved=await saveTrade(trade);
  if(!saved){btn.innerHTML='<i class="ti ti-check"></i> Guardar y analizar';btn.disabled=false;return;}
  trade.id=saved.id;trade.created_at=saved.created_at;
  S.trades.push(trade);
  closeModal('add-modal');
  showToast('Trade guardado. Analizando...');
  await analyzeTradeWithAI(trade);
  showPage(S.currentPage);
}

// ── AI ───────────────────────────────────────────────
async function analyzeTradeWithAI(trade){
  const cc=Object.values(trade.checklist||{}).filter(v=>v).length;
  const tc=Object.values(trade.checklist||{}).length;
  const pct=tc>0?Math.round(cc/tc*100):0;
  let ai;
  try{
    if(!S.apiKey){ai=localAI(trade,pct);}
    else{
      const prompt=`Coach trading profesional. Analiza este trade. Responde SOLO JSON sin markdown.\nTrade: Par=${trade.pair},Dir=${trade.direction},R=${trade.result},Setup=${trade.setup},Sesión=${trade.session},TF=${trade.timeframe},Emoción=${trade.emotion}/10,Confianza=${trade.confidence}/10,Estrés=${trade.stress}/10,Checklist=${pct}%,Notas="${trade.notes||'ninguna'}"\nJSON exacto español: {"score":0-100,"lo_que_hiciste_bien":["p1","p2"],"lo_que_hiciste_mal":["p1","p2"],"errores_detectados":[],"recomendacion":"frase","resumen":"2-3 frases"}`;
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
      const d=await res.json();
      ai=JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());
    }
  }catch(e){ai=localAI(trade,pct);}
  const idx=S.trades.findIndex(t=>t.id===trade.id);
  if(idx>=0){S.trades[idx].score=ai.score;S.trades[idx].errors=ai.errores_detectados||[];S.trades[idx].feedback=ai;}
  await updateTradeAI(trade.id,ai.score,ai.errores_detectados||[],ai);
  showToast(`Análisis completado — ${ai.score}/100`,'success');
}

function localAI(trade,pct){
  const w=trade.result>0;const g=pct>=70;
  let s=50;if(w)s+=20;if(g)s+=15;if(trade.emotion>=7)s+=10;if(trade.stress<=4)s+=5;
  if(!g)s-=20;if(trade.emotion<=4)s-=15;if(trade.stress>=8)s-=10;
  s=Math.max(5,Math.min(99,s));
  const errors=[];
  if(trade.emotion<=4&&!w)errors.push('Revenge Trading');
  if(trade.stress>=8)errors.push('FOMO');
  if(!g)errors.push('Sin Checklist');
  if(trade.session==='Asia'&&!w)errors.push('Ignorar HTF');
  return{score:s,lo_que_hiciste_bien:w?[g?'Seguiste la checklist correctamente':'Buena dirección del mercado','Setup bien identificado']:['Registraste el trade','Setup identificado'],lo_que_hiciste_mal:!g?['Checklist incompleta (menos del 70%)']:w?[]:['Entrada mal sincronizada','Condiciones no óptimas'],errores_detectados:errors,recomendacion:g&&w?'Sigue el proceso, estás operando bien.':'Completa siempre la checklist antes de entrar.',resumen:w?`Trade ganador +${trade.result}R en ${trade.pair}. Checklist al ${pct}%.`:`Trade perdedor ${trade.result}R. Revisa las condiciones de entrada.`};
}

  </div>

function renderSessionAnalysis(){
  const sm={};S.trades.forEach(t=>{if(!sm[t.session])sm[t.session]={trades:[],pnl:0};sm[t.session].trades.push(t);sm[t.session].pnl+=t.result;});
  if(!Object.keys(sm).length)return'<div class="empty" style="padding:16px 0"><div class="empty-sub">Sin datos de sesiones</div></div>';
  return Object.entries(sm).map(([k,v])=>{
    const wr=Math.round(v.trades.filter(t=>t.result>0).length/v.trades.length*100);
    const avgR=(v.pnl/v.trades.length).toFixed(1);
    return`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
      <div><div style="font-weight:500;font-size:13px;letter-spacing:-0.01em">${k}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${v.trades.length} trades</div></div>
      <div style="display:flex;gap:20px;text-align:right">
        <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px">WR</div><div class="${wr>=50?'pos':'neg'}" style="font-weight:600;font-family:'Geist Mono',monospace">${wr}%</div></div>
        <div><div style="font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px">Avg R</div><div class="${avgR>=0?'pos':'neg'}" style="font-weight:600;font-family:'Geist Mono',monospace">${avgR>=0?'+':''}${avgR}R</div></div>
      </div></div>`;
  }).join('');
}

function renderEmotionAnalysis(){
  const b={high:[],mid:[],low:[]};
  S.trades.forEach(t=>{if(t.emotion>=7)b.high.push(t.result);else if(t.emotion>=4)b.mid.push(t.result);else b.low.push(t.result);});
  const avg=a=>a.length?+(a.reduce((x,y)=>x+y,0)/a.length).toFixed(2):null;
  return`<div class="grid-3">${[{label:'Alto 7–10',arr:b.high,color:'var(--green)'},{label:'Medio 4–6',arr:b.mid,color:'var(--amber)'},{label:'Bajo 1–3',arr:b.low,color:'var(--red)'}].map(d=>`<div class="metric"><div class="metric-label">${d.label}</div><div class="metric-value" style="color:${d.color};font-size:22px">${avg(d.arr)!==null?(avg(d.arr)>=0?'+':'')+avg(d.arr)+'R':'—'}</div><div class="metric-sub">${d.arr.length} trades${d.arr.length?' · '+Math.round(d.arr.filter(r=>r>0).length/d.arr.length*100)+'% WR':''}</div></div>`).join('')}</div>`;
}

  <div class="grid-2">
    <div class="plan-section"><div class="plan-section-title" style="color:var(--green)"><i class="ti ti-check"></i> Setups permitidos</div>${plan.setups_permitidos.map(s=>`<div class="plan-rule"><span style="color:var(--green)">·</span>${s}</div>`).join('')}</div>
    <div class="plan-section"><div class="plan-section-title" style="color:var(--red)"><i class="ti ti-ban"></i> Prohibidos</div>${plan.comportamientos_prohibidos.map(s=>`<div class="plan-rule"><span style="color:var(--red)">·</span>${s}</div>`).join('')}</div>
  </div>`;
}

// ── HÁBITOS ──────────────────────────────────────────
function renderHabitos(){
  document.getElementById('main-content').innerHTML=`
  <div class="section-header">
    <div><h1>Hábitos</h1><p class="page-sub">Seguimiento de tus rutinas personales</p></div>
    <button class="btn btn-primary" onclick="openAddHabit()"><i class="ti ti-plus"></i> Nuevo Hábito</button>
  </div>
  <div id="habits-list">${renderHabitsList()}</div>`;
}

function renderHabitsList(){
  if(!S.habits.length)return`<div class="empty"><span class="empty-icon">🌱</span><div class="empty-title">Sin hábitos todavía</div><div class="empty-sub">Añade hábitos para hacer seguimiento diario</div></div>`;
  const today=new Date().toISOString().split('T')[0];
  const days=[];for(let i=6;i>=0;i--){const d=new Date(Date.now()-i*86400000);days.push(d.toISOString().split('T')[0]);}
  const streak=h=>{let s=0;const d=new Date();while(true){const k=`${h.id}_${d.toISOString().split('T')[0]}`;if(S.habitLogs[k])s++;else break;d.setDate(d.getDate()-1);}return s;};
  const catColors={'Físico':'tag-green','Mental':'tag-lila','Rutina':'tag-blue','Trading':'tag-amber','Otro':'tag-gray'};
  return S.habits.map(h=>`
  <div class="habit-row">
    <div>
      <div class="habit-name">${h.name}</div>
      <span class="tag ${catColors[h.category]||'tag-gray'} habit-cat" style="margin-top:4px;display:inline-flex">${h.category||'Otro'}</span>
    </div>
    <div class="habit-dots">
      ${days.map(d=>{
        const k=`${h.id}_${d}`;const done=S.habitLogs[k];const isToday=d===today;
        return`<div class="habit-dot ${done?'done':''}" title="${d}" onclick="toggleHabitLog(${h.id},'${d}')" style="${isToday?'border-color:var(--lila);width:13px;height:13px':''}"></div>`;
      }).join('')}
    </div>
    <div class="habit-streak">${streak(h) > 0?`🔥 ${streak(h)}d`:''}</div>
    <button class="btn btn-ghost btn-xs" onclick="deleteHabit(${h.id})" style="color:var(--text3)"><i class="ti ti-x"></i></button>
  </div>`).join('');
}

function openAddHabit(){
  const m=document.createElement('div');m.className='modal-overlay';m.id='habit-modal';
  m.innerHTML=`
  <div class="modal" style="max-width:420px">
    <div class="modal-title"><i class="ti ti-leaf" style="color:var(--lila)"></i> Nuevo Hábito</div>
    <div class="form-group"><label class="form-label">Nombre del hábito</label><input type="text" class="form-input" id="h-name" placeholder="ej: Meditación, Ejercicio, Lectura..."></div>
    <div class="form-group"><label class="form-label">Categoría</label>
      <select class="form-input" id="h-cat">${HABIT_CATS.map(c=>`<option>${c}</option>`).join('')}</select>
    </div>
    <div class="form-group"><label class="form-label">Nota (opcional)</label><input type="text" class="form-input" id="h-note" placeholder="Descripción breve"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost" onclick="closeModal('habit-modal')">Cancelar</button>
      <button class="btn btn-primary" onclick="submitHabit()"><i class="ti ti-check"></i> Añadir</button>
    </div>
  </div>`;
  document.body.appendChild(m);
  document.getElementById('h-name').focus();
}

async function submitHabit(){
  const name=document.getElementById('h-name').value.trim();
  if(!name){showToast('Escribe el nombre del hábito','warn');return;}
  const cat=document.getElementById('h-cat').value;
  const note=document.getElementById('h-note').value;
  try{
    const {data,error}=await sb.from('habits').insert({user_id:S.user.id,name,category:cat,note}).select().single();
    if(error)throw error;
    S.habits.push(data);closeModal('habit-modal');
    document.getElementById('habits-list').innerHTML=renderHabitsList();
    showToast('Hábito añadido','success');
  }catch(e){showToast('Error añadiendo hábito','warn');}
}

async function toggleHabitLog(habitId,date){
  const k=`${habitId}_${date}`;
  const done=!S.habitLogs[k];
  S.habitLogs[k]=done;
  try{
    if(done){await sb.from('habit_logs').upsert({user_id:S.user.id,habit_id:habitId,log_date:date,done:true},{onConflict:'user_id,habit_id,log_date'});}
    else{await sb.from('habit_logs').delete().eq('user_id',S.user.id).eq('habit_id',habitId).eq('log_date',date);}
  }catch(e){}
  document.getElementById('habits-list').innerHTML=renderHabitsList();
}

async function deleteHabit(id){
  if(!confirm('¿Eliminar este hábito y su historial?'))return;
  await sb.from('habit_logs').delete().eq('habit_id',id).eq('user_id',S.user.id);
  await sb.from('habits').delete().eq('id',id).eq('user_id',S.user.id);
  S.habits=S.habits.filter(h=>h.id!==id);
  const keys=Object.keys(S.habitLogs).filter(k=>k.startsWith(id+'_'));
  keys.forEach(k=>delete S.habitLogs[k]);
  document.getElementById('habits-list').innerHTML=renderHabitsList();
  showToast('Hábito eliminado');
}

// ── CONFIG ───────────────────────────────────────────
function renderConfig(){
  document.getElementById('main-content').innerHTML=`
  <div class="section-header"><div><h1>Configuración</h1><p class="page-sub">Personaliza tu experiencia</p></div></div>
  <div class="grid-2">
    <div>
      <div class="card" style="margin-bottom:14px">
        <div class="card-header"><span class="card-title">API Key Anthropic</span></div>
        <p style="font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.6">Opcional. Sin key la IA funciona en modo local. Con tu clave obtendrás análisis más precisos y detallados.</p>
        <div class="form-group"><input type="password" class="form-input" id="api-key-input" placeholder="sk-ant-..." value="${S.apiKey}"></div>
        <button class="btn btn-primary btn-sm" onclick="saveApiKey()"><i class="ti ti-check"></i> Guardar clave</button>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Datos</span></div>
        <button class="btn btn-ghost btn-sm" onclick="exportData()"><i class="ti ti-download"></i> Exportar trades JSON</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Checklist de trading</span>
        <button class="btn btn-ghost btn-sm" onclick="addCheckItem()"><i class="ti ti-plus"></i> Añadir</button>
      </div>
      <div id="cl-config">${renderCLConfig()}</div>
    </div>
  </div>`;
}

function renderCLConfig(){
  return S.checklist.map(c=>`
  <div class="check-item">
    <div class="check-box ${c.active?'checked':''}" onclick="toggleCLItem(${c.id})">${c.active?'<i class="ti ti-check" style="font-size:11px;color:#fff"></i>':''}</div>
    <input type="text" value="${c.label}" onchange="updateCLLabel(${c.id},this.value)" style="flex:1;background:transparent;border:none;color:var(--text);font-family:'Geist','Inter',sans-serif;font-size:13px;outline:none;letter-spacing:-0.01em">
    <button onclick="removeCLItem(${c.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 4px;font-size:13px"><i class="ti ti-x"></i></button>
  </div>`).join('');
}

async function toggleCLItem(id){const c=S.checklist.find(x=>x.id===id);if(c)c.active=!c.active;await saveChecklistCfg();document.getElementById('cl-config').innerHTML=renderCLConfig();}
async function updateCLLabel(id,val){const c=S.checklist.find(x=>x.id===id);if(c)c.label=val;await saveChecklistCfg();}
async function addCheckItem(){S.checklist.push({id:Date.now(),label:'Nuevo check',active:true});await saveChecklistCfg();document.getElementById('cl-config').innerHTML=renderCLConfig();}
async function removeCLItem(id){S.checklist=S.checklist.filter(c=>c.id!==id);await saveChecklistCfg();document.getElementById('cl-config').innerHTML=renderCLConfig();}
function saveApiKey(){S.apiKey=document.getElementById('api-key-input').value.trim();localStorage.setItem('ef_key',S.apiKey);showToast('API Key guardada','success');}
function exportData(){const b=new Blob([JSON.stringify(S.trades,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='edgeflow_trades.json';a.click();}

// ── UTILS ────────────────────────────────────────────
function closeModal(id){const m=document.getElementById(id);if(m)m.remove();}
function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.borderColor=type==='success'?'var(--green)':type==='warn'?'var(--amber)':'var(--border2)';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3500);
}
document.getElementById('auth-password').addEventListener('keydown',e=>{if(e.key==='Enter')handleAuth();});
</script>
</body>
</html>
