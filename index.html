<script>
// =====================================================
// ⚠️  CONFIGURA AQUÍ TUS CREDENCIALES DE SUPABASE
//     (las encontrarás en Supabase > Project Settings > API)
// =====================================================
const SUPABASE_URL  = 'https://vkjirtcqyexoyrpiflgu.supabase.co';   // ← cambia esto
const SUPABASE_KEY  = 'sb_publishable_92rFDjEPcxw9CfMRMJWN6A_qNUdfAdJ';                    // ← cambia esto

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// =====================================================
// CONSTANTES
// =====================================================
const PAIRS       = ['XAUUSD','NAS100','EURUSD','GBPUSD','US30','SPX500','USDJPY','BTCUSD','ETHUSDT'];
const SETUPS      = ['Liquidity Sweep + FVG','Order Block + BOS','CHOCH + FVG','Liquidity Sweep + OB','Fair Value Gap','Market Structure Break','Inducement + Sweep','Custom'];
const SESSIONS    = ['Londres','Nueva York','Asia','Londres/NY Overlap'];
const TIMEFRAMES  = ['M1','M5','M15','M30','H1','H4','D1'];
const ERROR_TYPES = ['FOMO','Revenge Trading','Entrada Temprana','Entrada Tardía','Ignorar HTF','Overtrading','Sin Checklist','Gestión Pobre'];
const DEFAULT_CHECKLIST = [
  {id:1,label:'Liquidez tomada',active:true},
  {id:2,label:'BOS confirmado',active:true},
  {id:3,label:'CHOCH confirmado',active:true},
  {id:4,label:'FVG presente',active:true},
  {id:5,label:'Order Block presente',active:true},
  {id:6,label:'Bias HTF confirmado',active:true},
  {id:7,label:'Zona premium/discount',active:true},
  {id:8,label:'Sesión correcta',active:true},
  {id:9,label:'Riesgo controlado',active:true},
];

// =====================================================
// ESTADO EN MEMORIA
// =====================================================
let state = {
  user:        null,
  trades:      [],
  checklist:   [...DEFAULT_CHECKLIST],
  weeklyPlan:  null,
  apiKey:      '',
  equityChart: null,
  currentPage: 'dashboard',
};

// =====================================================
// AUTH
// =====================================================
let authMode = 'login';

function switchAuthTab(mode) {
  authMode = mode;
  document.querySelectorAll('.auth-tab').forEach((t,i) => {
    t.classList.toggle('active', (mode==='login' && i===0)||(mode==='register' && i===1));
  });
  document.getElementById('auth-btn').textContent = mode === 'login' ? 'Iniciar sesión' : 'Crear cuenta';
  document.getElementById('auth-error').style.display = 'none';
}

async function handleAuth() {
  const email    = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  const errEl    = document.getElementById('auth-error');
  errEl.style.display = 'none';

  if (!email || !password) { showAuthError('Completa email y contraseña'); return; }

  const btn = document.getElementById('auth-btn');
  btn.textContent = 'Cargando...';
  btn.disabled = true;

  try {
    let result;
    if (authMode === 'login') {
      result = await sb.auth.signInWithPassword({ email, password });
    } else {
      result = await sb.auth.signUp({ email, password });
    }
    if (result.error) throw result.error;
    // onAuthStateChange se encarga del resto
  } catch (e) {
    const msgs = {
      'Invalid login credentials': 'Email o contraseña incorrectos',
      'User already registered':   'Este email ya está registrado',
      'Password should be at least 6 characters': 'La contraseña debe tener al menos 6 caracteres',
    };
    showAuthError(msgs[e.message] || e.message);
    btn.disabled = false;
    btn.textContent = authMode === 'login' ? 'Iniciar sesión' : 'Crear cuenta';
  }
}

function showAuthError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.style.display = 'block';
}

async function handleLogout() {
  await sb.auth.signOut();
  state.trades = [];
  state.checklist = [...DEFAULT_CHECKLIST];
  state.weeklyPlan = null;
  state.user = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
}

// Escucha cambios de sesión
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    state.user = session.user;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    const letter = session.user.email[0].toUpperCase();
    document.getElementById('user-avatar').textContent = letter;
    document.getElementById('user-email-display').textContent = session.user.email.split('@')[0];
    await loadUserData();
    showPage('dashboard');
  }
});

// =====================================================
// CARGA DE DATOS DEL USUARIO
// =====================================================
async function loadUserData() {
  // Cargar trades
  const { data: trades } = await sb
    .from('trades')
    .select('*')
    .order('created_at', { ascending: true });
  state.trades = (trades || []).map(t => ({
    ...t,
    result:   parseFloat(t.result),
    checklist: t.checklist || {},
    errors:    t.errors    || [],
    feedback:  t.feedback  || null,
  }));

  // Cargar checklist config
  const { data: cfg } = await sb
    .from('checklist_config')
    .select('items')
    .eq('user_id', state.user.id)
    .single();
  if (cfg?.items?.length) state.checklist = cfg.items;

  // Cargar plan semanal más reciente
  const { data: plans } = await sb
    .from('weekly_plans')
    .select('plan')
    .eq('user_id', state.user.id)
    .order('created_at', { ascending: false })
    .limit(1);
  if (plans?.length) state.weeklyPlan = plans[0].plan;

  // API Key en localStorage (no va a la BD)
  state.apiKey = localStorage.getItem('ef_apikey') || '';
}

// =====================================================
// GUARDAR TRADE EN SUPABASE
// =====================================================
async function saveTrade(trade) {
  const row = {
    user_id:    state.user.id,
    pair:       trade.pair,
    direction:  trade.dir,
    result:     trade.result,
    rr:         trade.rr,
    setup:      trade.setup,
    session:    trade.session,
    timeframe:  trade.tf,
    emotion:    trade.emotion,
    confidence: trade.confidence,
    stress:     trade.stress,
    notes:      trade.notes,
    checklist:  trade.checklist,
    score:      trade.score,
    errors:     trade.errors,
    feedback:   trade.feedback,
  };
  const { data, error } = await sb.from('trades').insert(row).select().single();
  if (error) { console.error(error); showToast('Error guardando trade','warn'); return null; }
  return data;
}

async function updateTradeAI(tradeId, score, errors, feedback) {
  await sb.from('trades').update({ score, errors, feedback }).eq('id', tradeId);
}

async function deleteTrade(id) {
  await sb.from('trades').delete().eq('id', id);
}

async function saveChecklistConfig() {
  const { error } = await sb
    .from('checklist_config')
    .upsert({ user_id: state.user.id, items: state.checklist }, { onConflict: 'user_id' });
  if (error) console.error(error);
}

async function saveWeeklyPlan(plan) {
  const today = new Date().toISOString().split('T')[0];
  await sb.from('weekly_plans').insert({ user_id: state.user.id, week_start: today, plan });
}

// =====================================================
// ESTADÍSTICAS
// =====================================================
function calcStats() {
  const t = state.trades;
  if (!t.length) return { total:0,wr:0,rr:0,pnl:0,weekPnl:0,dayPnl:0,winStreak:0,loseStreak:0,bestSetup:'-',bestSession:'-',count:0 };
  const wins  = t.filter(x => x.result > 0);
  const total = t.reduce((a,b) => a + b.result, 0);
  const wr    = Math.round(wins.length / t.length * 100);
  const rr    = +(total / t.length).toFixed(2);
  const now   = new Date(); const wStart = new Date(now); wStart.setDate(now.getDate()-7);
  const weekPnl = t.filter(x => new Date(x.created_at) >= wStart).reduce((a,b)=>a+b.result,0);
  const today   = new Date().toISOString().split('T')[0];
  const dayPnl  = t.filter(x => x.created_at?.slice(0,10) === today).reduce((a,b)=>a+b.result,0);
  let ws=0,ls=0,cW=0,cL=0;
  for(let i=t.length-1;i>=0;i--){
    if(t[i].result>0){cW++;cL=0}else{cL++;cW=0}
    if(cW>ws)ws=cW; if(cL>ls)ls=cL;
  }
  const sm={};t.forEach(x=>{sm[x.setup]=(sm[x.setup]||[]);sm[x.setup].push(x.result)});
  let bS='-',bSR=-999;
  Object.entries(sm).forEach(([k,v])=>{const a=v.reduce((a,b)=>a+b,0)/v.length;if(a>bSR){bSR=a;bS=k}});
  const se={};t.forEach(x=>{se[x.session]=(se[x.session]||[]);se[x.session].push(x.result)});
  let bSe='-',bSeR=-999;
  Object.entries(se).forEach(([k,v])=>{const a=v.reduce((a,b)=>a+b,0)/v.length;if(a>bSeR){bSeR=a;bSe=k}});
  return{total:+total.toFixed(2),wr,rr,pnl:+total.toFixed(2),weekPnl:+weekPnl.toFixed(2),dayPnl:+dayPnl.toFixed(2),winStreak:ws,loseStreak:ls,bestSetup:bS,bestSession:bSe,count:t.length};
}

function calcErrors(){
  const c={};ERROR_TYPES.forEach(e=>c[e]=0);
  state.trades.forEach(t=>(t.errors||[]).forEach(e=>{if(c[e]!==undefined)c[e]++}));
  return c;
}

function calcPatterns(){
  const t=state.trades;if(t.length<3)return[];
  const p=[];
  const sm={};t.forEach(x=>{sm[x.session]=(sm[x.session]||[]);sm[x.session].push(x.result)});
  let wS=null,wA=999;
  Object.entries(sm).forEach(([k,v])=>{const a=v.reduce((a,b)=>a+b,0)/v.length;if(a<wA&&v.length>1){wA=a;wS=k}});
  if(wS&&wA<0)p.push({type:'danger',text:`Tu sesión más débil es ${wS} con ${wA.toFixed(1)}R de media`});
  const sp={};t.forEach(x=>{sp[x.setup]=(sp[x.setup]||[]);sp[x.setup].push(x.result)});
  let bS=null,bA=-999;
  Object.entries(sp).forEach(([k,v])=>{const a=v.reduce((a,b)=>a+b,0)/v.length;if(a>bA&&v.length>1){bA=a;bS=k}});
  if(bS)p.push({type:'green',text:`Tu setup más rentable es "${bS}" con +${bA.toFixed(1)}R de media`});
  const nc=t.filter(x=>Object.values(x.checklist||{}).filter(v=>!v).length>3);
  if(nc.length>1){const wr=nc.filter(x=>x.result>0).length/nc.length;if(wr<0.4)p.push({type:'danger',text:`Pierdes dinero cuando ignoras la checklist (${Math.round(wr*100)}% WR)`});}
  for(let i=1;i<t.length;i++){if(t[i-1].result<0&&(t[i].errors||[]).includes('Revenge Trading')){p.push({type:'warn',text:'Haces revenge trading después de una pérdida'});break;}}
  const le=t.filter(x=>x.emotion<=4);
  if(le.length>1){const a=le.reduce((a,b)=>a+b.result,0)/le.length;if(a<0)p.push({type:'warn',text:`Con estado emocional bajo (≤4) tu PnL medio es ${a.toFixed(1)}R`});}
  return p;
}

// =====================================================
// EQUITY CURVE
// =====================================================
function drawEquity(canvasId){
  const canvas=document.getElementById(canvasId);if(!canvas)return;
  if(state.equityChart){state.equityChart.destroy();state.equityChart=null;}
  const t=[...state.trades].sort((a,b)=>a.created_at>b.created_at?1:-1);
  let cum=0;const labels=[],data=[];
  t.forEach(x=>{cum+=x.result;labels.push(x.created_at?.slice(5,10)||'');data.push(+cum.toFixed(2))});
  if(!labels.length){labels.push('Inicio');data.push(0);}
  const isPos=data[data.length-1]>=0;
  state.equityChart=new Chart(canvas,{
    type:'line',
    data:{labels,datasets:[{data,borderColor:isPos?'#2ecc71':'#e74c3c',backgroundColor:isPos?'rgba(46,204,113,0.08)':'rgba(231,76,60,0.08)',borderWidth:2,fill:true,tension:0.4,pointRadius:3,pointBackgroundColor:isPos?'#2ecc71':'#e74c3c'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw}R`}}},scales:{x:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#4a6070',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{color:'#4a6070',font:{size:10},callback:v=>v+'R'}}}}
  });
}

// ROUTER

function showPage(page){
  state.currentPage=page;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const b=document.getElementById('nav-'+page);if(b)b.classList.add('active');
  const pages={dashboard:renderDashboard,trades:renderTrades,analisis:renderAnalisis,plan:renderPlan,config:renderConfig};
  document.getElementById('main-content').innerHTML='';
  if(pages[page])pages[page]();
}

    <div><h1 style="font-size:20px;font-weight:700">Dashboard</h1><p style="color:var(--text2);font-size:13px;margin-top:2px">Resumen de tu rendimiento</p></div>
    <button class="btn btn-primary" onclick="openAddTrade()"><i class="ti ti-plus"></i> Añadir Trade</button>
  </div>
  <div class="grid-4" style="margin-bottom:16px">
    <div class="metric"><div class="metric-label">PnL Total</div><div class="metric-value ${s.pnl>=0?'pos':'neg'}">${s.pnl>=0?'+':''}${s.pnl}R</div><div class="metric-sub">${s.count} trades</div></div>
    <div class="metric"><div class="metric-label">Win Rate</div><div class="metric-value ${s.wr>=50?'pos':'neg'}">${s.wr}%</div><div class="metric-sub">Histórico</div></div>
    <div class="metric"><div class="metric-label">RR Medio</div><div class="metric-value ${s.rr>=0?'pos':'neg'}">${s.rr>=0?'+':''}${s.rr}R</div><div class="metric-sub">Por trade</div></div>
    <div class="metric"><div class="metric-label">PnL Semanal</div><div class="metric-value ${s.weekPnl>=0?'pos':'neg'}">${s.weekPnl>=0?'+':''}${s.weekPnl}R</div><div class="metric-sub">Últimos 7 días</div></div>
  </div>
  <div class="grid-4" style="margin-bottom:16px">
    <div class="metric"><div class="metric-label">Racha Ganancias</div><div class="metric-value pos">${s.winStreak}</div></div>
    <div class="metric"><div class="metric-label">Racha Pérdidas</div><div class="metric-value neg">${s.loseStreak}</div></div>
    <div class="metric"><div class="metric-label">Mejor Setup</div><div class="metric-value" style="font-size:12px;color:var(--green)">${s.bestSetup}</div></div>
    <div class="metric"><div class="metric-label">Mejor Sesión</div><div class="metric-value" style="font-size:15px;color:var(--green)">${s.bestSession}</div></div>
  </div>
  <div class="grid-2" style="margin-bottom:16px">
    <div class="card"><div class="card-header"><span class="card-title">Equity Curve</span></div><div class="chart-area" style="height:200px"><canvas id="eq-chart"></canvas></div></div>

  </div>
  <div class="card">
    <div class="card-header"><span class="card-title">Últimos Trades</span><button class="btn btn-ghost btn-sm" onclick="showPage('trades')">Ver todos →</button></div>
    ${renderTradeList(state.trades.slice(-5).reverse())}

function renderPatterns(){
  const p=calcPatterns();
  if(!p.length)return'<p style="color:var(--text3);font-size:13px;padding:8px 0">Necesitas más trades para detectar patrones</p>';
  return p.map(x=>`<div class="insight-card ${x.type==='danger'?'danger':x.type==='warn'?'warn':''}">${x.text}</div>`).join('');
}

function renderTradeList(trades){
  if(!trades.length)return'<p style="color:var(--text3);text-align:center;padding:32px">Sin trades todavía. ¡Registra el primero!</p>';
  return trades.map(t=>`
  <div class="trade-row" onclick="openTradeDetail(${t.id})">
    <div class="trade-pair">${t.pair}</div>
    <div class="trade-dir"><span class="tag ${t.direction==='Compra'?'tag-green':'tag-red'}">${t.direction==='Compra'?'▲ LONG':'▼ SHORT'}</span></div>
    <div class="trade-result ${t.result>=0?'pos':'neg'}">${t.result>=0?'+':''}${t.result}R</div>
    <div class="trade-meta">${t.session} · ${t.timeframe} · ${(t.setup||'').substring(0,22)}${(t.setup||'').length>22?'...':''}</div>
    <div style="color:var(--text3);font-size:12px">${t.created_at?.slice(0,10)||''}</div>
    <div><div class="score-circle" style="background:${t.score>=70?'var(--green-dim)':t.score>=40?'var(--amber-dim)':'var(--red-dim)'};color:${t.score>=70?'var(--green)':t.score>=40?'var(--amber)':'var(--red)'}">${t.score||'?'}</div></div>
  </div>`).join('');
}

async function analyzeTradeWithAI(trade){
  const checkCount=Object.values(trade.checklist||{}).filter(v=>v).length;
  const totalChecks=Object.values(trade.checklist||{}).length;
  const checkPct=totalChecks>0?Math.round(checkCount/totalChecks*100):0;
  const prompt=`Eres un coach de trading profesional. Analiza este trade y responde SOLO en JSON sin markdown.
TRADE: Par=${trade.pair}, Dirección=${trade.direction||trade.dir}, Resultado=${trade.result}R, Setup=${trade.setup}, Sesión=${trade.session}, Timeframe=${trade.timeframe||trade.tf}, Emoción=${trade.emotion}/10, Confianza=${trade.confidence}/10, Estrés=${trade.stress}/10, Checklist=${checkPct}% (${checkCount}/${totalChecks}), Notas="${trade.notes||'Sin notas'}"
Responde en JSON exacto (español):
{"score":número 0-100,"lo_que_hiciste_bien":["p1","p2"],"lo_que_hiciste_mal":["p1","p2"],"errores_detectados":[],"recomendacion":"frase corta","resumen":"2-3 frases"}`;

  let ai;
  try{
    if(!state.apiKey){ai=generateLocalAI(trade,checkPct);}
    else{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
      const d=await res.json();
      ai=JSON.parse(d.content[0].text.replace(/```json|```/g,'').trim());
    }
  }catch(e){ai=generateLocalAI(trade,checkPct);}

  const idx=state.trades.findIndex(t=>t.id===trade.id);
  if(idx>=0){state.trades[idx].score=ai.score;state.trades[idx].errors=ai.errores_detectados||[];state.trades[idx].feedback=ai;}
  await updateTradeAI(trade.id,ai.score,ai.errores_detectados||[],ai);
  showToast(`Análisis IA: ${ai.score}/100`,'success');
}

function generateLocalAI(trade,checkPct){
  const isWin=trade.result>0;const good=checkPct>=70;
  let score=50;
  if(isWin)score+=20;if(good)score+=15;if(trade.emotion>=7)score+=10;if(trade.stress<=4)score+=5;
  if(!good)score-=20;if(trade.emotion<=4)score-=15;if(trade.stress>=8)score-=10;
  score=Math.max(5,Math.min(99,score));
  const errors=[];
  if(trade.emotion<=4&&!isWin)errors.push('Revenge Trading');
  if(trade.stress>=8)errors.push('FOMO');
  if(!good)errors.push('Sin Checklist');
  if(trade.session==='Asia'&&!isWin)errors.push('Ignorar HTF');
  return{score,lo_que_hiciste_bien:isWin?[good?'Seguiste la checklist':'Buena dirección','Buen setup']:['Registraste el trade','Identificaste el setup'],lo_que_hiciste_mal:!good?['Checklist incompleta (< 70%)']:isWin?[]:['Entrada mal sincronizada'],errores_detectados:errors,recomendacion:good&&isWin?'Excelente, sigue el proceso.':'Completa siempre la checklist antes de entrar.',resumen:isWin?`Trade ganador +${trade.result}R en ${trade.pair}. Checklist ${checkPct}%.`:`Trade perdedor ${trade.result}R. Revisa condiciones de entrada.`};
}

function renderSessionAnalysis(){

  return Object.entries(sm).map(([k,v])=>{
    const wr=Math.round(v.trades.filter(t=>t.result>0).length/v.trades.length*100);

      </div></div>`;
  }).join('');
}

function renderEmotionAnalysis(){
  const b={high:[],mid:[],low:[]};
  state.trades.forEach(t=>{if(t.emotion>=7)b.high.push(t.result);else if(t.emotion>=4)b.mid.push(t.result);else b.low.push(t.result);});
  const avg=a=>a.length?+(a.reduce((x,y)=>x+y,0)/a.length).toFixed(2):null;
  return`<div class="grid-3">${[
    {label:'Alto (7-10)',arr:b.high,color:'var(--green)'},
    {label:'Medio (4-6)',arr:b.mid,color:'var(--amber)'},

}

  return state.checklist.map(c=>`
  <div class="check-item">
    <div class="check-box ${c.active?'checked':''}" onclick="toggleCheckConfig(${c.id})">${c.active?'<i class="ti ti-check" style="font-size:12px;color:#080c0f"></i>':''}</div>
    <input type="text" value="${c.label}" onchange="updateCheckLabel(${c.id},this.value)" style="flex:1;background:transparent;border:none;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:13px;outline:none">
    <button onclick="removeCheckItem(${c.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 4px"><i class="ti ti-x"></i></button>
  </div>`).join('');
}

async function toggleCheckConfig(id){
  const c=state.checklist.find(x=>x.id===id);if(c)c.active=!c.active;
  await saveChecklistConfig();
  document.getElementById('checklist-config').innerHTML=renderChecklistConfig();
}
async function updateCheckLabel(id,val){
  const c=state.checklist.find(x=>x.id===id);if(c)c.label=val;
  await saveChecklistConfig();
}
async function addCheckItem(){
  state.checklist.push({id:Date.now(),label:'Nuevo check',active:true});
  await saveChecklistConfig();
  document.getElementById('checklist-config').innerHTML=renderChecklistConfig();
}
async function removeCheckItem(id){
  state.checklist=state.checklist.filter(c=>c.id!==id);
  await saveChecklistConfig();
  document.getElementById('checklist-config').innerHTML=renderChecklistConfig();
}
function saveApiKey(){
  state.apiKey=document.getElementById('api-key-input').value.trim();
  localStorage.setItem('ef_apikey',state.apiKey);
  showToast('API Key guardada','success');
}
function exportData(){
  const blob=new Blob([JSON.stringify(state.trades,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='edgeflow_trades.json';a.click();
}

// =====================================================
// UTILS
// =====================================================
function closeModal(id){const m=document.getElementById(id);if(m)m.remove();}
function showToast(msg,type='info'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.borderColor=type==='success'?'var(--green)':type==='warn'?'var(--amber)':'var(--border2)';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);
}

// Permite pulsar Enter en el login
document.getElementById('auth-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleAuth();
});
</script>
