// ── Persistence ─────────────────────────────────────
function loadState() {
  try {
    const s = localStorage.getItem('edgeflow_state');
    if (s) {
      const p = JSON.parse(s);
      Object.assign(state, p);
    }
    state.equityChart = null;
    state.errorChart  = null;
  } catch (e) {}
}

function saveState() {
  const s = { ...state };
  delete s.equityChart;
  delete s.errorChart;
  localStorage.setItem('edgeflow_state', JSON.stringify(s));
}

// ── Stats ────────────────────────────────────────────
function calcStats() {
  const t = state.trades;
  if (t.length === 0) return { total:0, wr:0, rr:0, pnl:0, weekPnl:0, dayPnl:0, winStreak:0, loseStreak:0, bestSetup:'-', bestSession:'-', count:0 };

  const wins  = t.filter(x => x.result > 0);
  const total = t.reduce((a, b) => a + b.result, 0);
  const wr    = Math.round((wins.length / t.length) * 100);
  const rr    = +(total / t.length).toFixed(2);

  const now    = new Date();
  const wStart = new Date(now); wStart.setDate(now.getDate() - 7);
  const weekPnl = t.filter(x => new Date(x.date) >= wStart).reduce((a, b) => a + b.result, 0);

  const today  = new Date().toISOString().split('T')[0];
  const dayPnl = t.filter(x => x.date === today).reduce((a, b) => a + b.result, 0);

  let ws = 0, ls = 0, curW = 0, curL = 0;
  for (let i = t.length - 1; i >= 0; i--) {
    if (t[i].result > 0) { curW++; curL = 0; } else { curL++; curW = 0; }
    if (curW > ws) ws = curW;
    if (curL > ls) ls = curL;
  }

  const setupMap = {};
  t.forEach(x => { setupMap[x.setup] = (setupMap[x.setup] || []); setupMap[x.setup].push(x.result); });
  let bestSetup = '-', bestSetupR = -999;
  Object.entries(setupMap).forEach(([k, v]) => {
    const avg = v.reduce((a, b) => a + b, 0) / v.length;
    if (avg > bestSetupR) { bestSetupR = avg; bestSetup = k; }
  });

  const sessMap = {};
  t.forEach(x => { sessMap[x.session] = (sessMap[x.session] || []); sessMap[x.session].push(x.result); });
  let bestSession = '-', bestSessR = -999;
  Object.entries(sessMap).forEach(([k, v]) => {
    const avg = v.reduce((a, b) => a + b, 0) / v.length;
    if (avg > bestSessR) { bestSessR = avg; bestSession = k; }
  });

  return { total: +total.toFixed(2), wr, rr, pnl: +total.toFixed(2), weekPnl: +weekPnl.toFixed(2), dayPnl: +dayPnl.toFixed(2), winStreak: ws, loseStreak: ls, bestSetup, bestSession, count: t.length };
}

function calcErrors() {
  const counts = {};
  ERROR_TYPES.forEach(e => counts[e] = 0);
  state.trades.forEach(t => { (t.errors || []).forEach(e => { if (counts[e] !== undefined) counts[e]++; }); });
  return counts;
}

function calcPatterns() {
  const t = state.trades;
  if (t.length < 3) return [];
  const patterns = [];

  const sessMap = {};
  t.forEach(x => { sessMap[x.session] = (sessMap[x.session] || []); sessMap[x.session].push(x.result); });
  let worstSess = null, worstAvg = 999;
  Object.entries(sessMap).forEach(([k, v]) => {
    const avg = v.reduce((a, b) => a + b, 0) / v.length;
    if (avg < worstAvg && v.length > 1) { worstAvg = avg; worstSess = k; }
  });
  if (worstSess && worstAvg < 0) patterns.push({ type: 'danger', text: `Tu sesión más débil es ${worstSess} con ${worstAvg.toFixed(1)}R de media` });

  const setupMap = {};
  t.forEach(x => { setupMap[x.setup] = (setupMap[x.setup] || []); setupMap[x.setup].push(x.result); });
  let bestSetup = null, bestAvg = -999;
  Object.entries(setupMap).forEach(([k, v]) => {
    const avg = v.reduce((a, b) => a + b, 0) / v.length;
    if (avg > bestAvg && v.length > 1) { bestAvg = avg; bestSetup = k; }
  });
  if (bestSetup) patterns.push({ type: 'green', text: `Tu setup más rentable es "${bestSetup}" con +${bestAvg.toFixed(1)}R de media` });

  const noCheck = t.filter(x => Object.values(x.checklist || {}).filter(v => !v).length > 3);
  const checkWR = noCheck.length > 0 ? noCheck.filter(x => x.result > 0).length / noCheck.length : 1;
  if (checkWR < 0.4 && noCheck.length > 1) patterns.push({ type: 'danger', text: `Pierdes dinero cuando ignoras la checklist (${Math.round(checkWR * 100)}% WR sin checklist)` });

  for (let i = 1; i < t.length; i++) {
    if (t[i - 1].result < 0 && (t[i].errors || []).includes('Revenge Trading')) {
      patterns.push({ type: 'warn', text: 'Patrón detectado: Haces revenge trading después de una pérdida' });
      break;
    }
  }

  const lowEmot = t.filter(x => x.emotion <= 4);
  if (lowEmot.length > 1) {
    const avgR = lowEmot.reduce((a, b) => a + b.result, 0) / lowEmot.length;
    if (avgR < 0) patterns.push({ type: 'warn', text: `Cuando tu estado emocional es bajo (≤4), tu PnL medio es ${avgR.toFixed(1)}R` });
  }

  return patterns;
}

// ── Equity Curve ─────────────────────────────────────
function drawEquity(canvasId) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  if (state.equityChart) { state.equityChart.destroy(); state.equityChart = null; }

  const t = [...state.trades].sort((a, b) => a.date > b.date ? 1 : -1);
  let cum = 0;
  const labels = [], data = [];
  t.forEach(x => { cum += x.result; labels.push(x.date.slice(5)); data.push(+cum.toFixed(2)); });
  if (labels.length === 0) { labels.push('Inicio'); data.push(0); }

  const isPos = data[data.length - 1] >= 0;
  state.equityChart = new Chart(canvas, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor:     isPos ? '#2ecc71' : '#e74c3c',
        backgroundColor: isPos ? 'rgba(46,204,113,0.08)' : 'rgba(231,76,60,0.08)',
        borderWidth: 2,
        fill: true,
        tension: 0.4,
        pointRadius: 3,
        pointBackgroundColor: isPos ? '#2ecc71' : '#e74c3c'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => `${c.raw}R` } } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#4a6070', font: { size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#4a6070', font: { size: 10 }, callback: v => v + 'R' } }
      }
    }
  });
}

// ── Router ───────────────────────────────────────────
function showPage(page) {
  state.currentPage = page;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + page);
  if (btn) btn.classList.add('active');

  const pages = { dashboard: renderDashboard, trades: renderTrades, analisis: renderAnalisis, plan: renderPlan, config: renderConfig };
  const mc = document.getElementById('main-content');
  if (pages[page]) { mc.innerHTML = ''; pages[page](); }
}

  const p = calcPatterns();

  return p.map(x => `<div class="insight-card ${x.type === 'danger' ? 'danger' : x.type === 'warn' ? 'warn' : ''}">${x.text}</div>`).join('');
}

  <div class="trade-row" onclick="openTradeDetail(${t.id})">
    <div class="trade-pair">${t.pair}</div>
    <div class="trade-dir"><span class="tag ${t.dir === 'Compra' ? 'tag-green' : 'tag-red'}">${t.dir === 'Compra' ? '▲ LONG' : '▼ SHORT'}</span></div>
    <div class="trade-result ${t.result >= 0 ? 'pos' : 'neg'}">${t.result >= 0 ? '+' : ''}${t.result}R</div>
    <div class="trade-meta">${t.session} · ${t.tf} · ${t.setup.substring(0, 20)}${t.setup.length > 20 ? '...' : ''}</div>
    <div style="color:var(--text3);font-size:12px">${t.date}</div>

}

// ── AI Analysis ──────────────────────────────────────
async function analyzeTradeWithAI(trade) {
  const checkCount = Object.values(trade.checklist).filter(v => v).length;
  const totalChecks = Object.values(trade.checklist).length;
  const checkPct = totalChecks > 0 ? Math.round((checkCount / totalChecks) * 100) : 0;

  const prompt = `Eres un coach de trading profesional. Analiza este trade y responde SOLO en JSON sin markdown.

TRADE:
- Par: ${trade.pair}
- Dirección: ${trade.dir}
- Resultado: ${trade.result}R
- Setup: ${trade.setup}
- Sesión: ${trade.session}
- Timeframe: ${trade.tf}
- Estado emocional: ${trade.emotion}/10
- Confianza: ${trade.confidence}/10
- Estrés: ${trade.stress}/10
- Checklist completada: ${checkPct}% (${checkCount}/${totalChecks} items)
- Notas del trader: "${trade.notes || 'Sin notas'}"

Responde en este JSON exacto (en español):
{
  "score": número del 0 al 100,
  "lo_que_hiciste_bien": ["punto1","punto2"],
  "lo_que_hiciste_mal": ["punto1","punto2"],
  "errores_detectados": ["FOMO","Revenge Trading","Entrada Temprana","Entrada Tardía","Ignorar HTF","Overtrading","Sin Checklist","Gestión Pobre"],
  "recomendacion": "recomendación concreta en 1-2 frases",
  "resumen": "análisis breve de 2-3 frases del trade"
}`;

  try {
    if (!state.apiKey) {
      applyAIResult(trade.id, generateLocalAI(trade, checkPct));
      return;
    }
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': state.apiKey, 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const text = data.content[0].text.replace(/```json|```/g, '').trim();
    applyAIResult(trade.id, JSON.parse(text));
  } catch (e) {
    applyAIResult(trade.id, generateLocalAI(trade, checkPct));
  }
}

function generateLocalAI(trade, checkPct) {
  const isWin = trade.result > 0;
  const goodChecklist = checkPct >= 70;
  let score = 50;
  if (isWin)          score += 20;
  if (goodChecklist)  score += 15;
  if (trade.emotion >= 7) score += 10;
  if (trade.stress  <= 4) score += 5;
  if (!goodChecklist)     score -= 20;
  if (trade.emotion <= 4) score -= 15;
  if (trade.stress  >= 8) score -= 10;
  if (!isWin && trade.emotion <= 4) score -= 10;
  score = Math.max(5, Math.min(99, score));

  const errors = [];
  if (trade.emotion <= 4 && !isWin) errors.push('Revenge Trading');
  if (trade.stress >= 8)             errors.push('FOMO');
  if (!goodChecklist)                errors.push('Sin Checklist');
  if (trade.session === 'Asia' && !isWin) errors.push('Ignorar HTF');

  return {
    score,
    lo_que_hiciste_bien: isWin
      ? [goodChecklist ? 'Seguiste la checklist correctamente' : 'Buena dirección del mercado', 'Seleccionaste un buen setup']
      : ['Registraste el trade en el journal', 'Identificaste el setup'],
    lo_que_hiciste_mal: !goodChecklist
      ? ['No completaste la checklist (menos del 70%)']
      : isWin ? [] : ['La entrada no estuvo bien sincronizada', 'Las condiciones de mercado no eran óptimas'],
    errores_detectados: errors,
    recomendacion: goodChecklist && isWin
      ? 'Excelente trade. Sigue respetando tu proceso.'
      : 'Trabaja en completar siempre la checklist antes de entrar. La consistencia es clave.',
    resumen: isWin
      ? `Trade ganador de +${trade.result}R en ${trade.pair}. Checklist al ${checkPct}%.`
      : `Trade perdedor de ${trade.result}R. Revisa las condiciones de entrada y respeta la checklist.`
  };
}

function applyAIResult(id, ai) {
  const idx = state.trades.findIndex(t => t.id === id);
  if (idx < 0) return;
  state.trades[idx].score    = ai.score;
  state.trades[idx].errors   = ai.errores_detectados || [];
  state.trades[idx].feedback = ai;
  saveState();
  showToast(`Análisis IA completado. Puntuación: ${ai.score}/100`, 'success');
}

function renderSessionAnalysis() {
  const sessMap = {};
  state.trades.forEach(t => {
    if (!sessMap[t.session]) sessMap[t.session] = { trades: [], pnl: 0 };
    sessMap[t.session].trades.push(t);
    sessMap[t.session].pnl += t.result;
  });
  if (Object.keys(sessMap).length === 0) return '<p style="color:var(--text3);font-size:13px">Sin datos de sesiones</p>';
  return Object.entries(sessMap).map(([k, v]) => {
    const wr   = Math.round(v.trades.filter(t => t.result > 0).length / v.trades.length * 100);
    const avgR = (v.pnl / v.trades.length).toFixed(1);
    return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
      <div><div style="font-weight:600;font-size:13px">${k}</div><div style="font-size:12px;color:var(--text3)">${v.trades.length} trades</div></div>
      <div style="display:flex;gap:16px;text-align:right">
        <div><div style="font-size:11px;color:var(--text3)">WR</div><div class="${wr >= 50 ? 'pos' : 'neg'}" style="font-weight:700">${wr}%</div></div>
        <div><div style="font-size:11px;color:var(--text3)">Avg R</div><div class="${avgR >= 0 ? 'pos' : 'neg'}" style="font-weight:700;font-family:'JetBrains Mono',monospace">${avgR >= 0 ? '+' : ''}${avgR}R</div></div>
      </div>
    </div>`;
  }).join('');
}

function renderEmotionAnalysis() {
  const byEmotion = { high: [], mid: [], low: [] };
  state.trades.forEach(t => {
    if      (t.emotion >= 7) byEmotion.high.push(t.result);
    else if (t.emotion >= 4) byEmotion.mid.push(t.result);
    else                     byEmotion.low.push(t.result);
  });
  const avg = arr => arr.length ? +(arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(2) : null;
  const data = [
    { label: 'Emocional alto (7-10)', arr: byEmotion.high, color: 'var(--green)' },
    { label: 'Emocional medio (4-6)', arr: byEmotion.mid,  color: 'var(--amber)' },
    { label: 'Emocional bajo (1-3)',  arr: byEmotion.low,  color: 'var(--red)'   },
  ];
  return `<div class="grid-3">${data.map(d => `
    <div class="metric">
      <div class="metric-label">${d.label}</div>
      <div class="metric-value" style="color:${d.color}">${avg(d.arr) !== null ? (avg(d.arr) >= 0 ? '+' : '') + avg(d.arr) + 'R' : '—'}</div>
      <div class="metric-sub">${d.arr.length} trades · WR: ${d.arr.length ? Math.round(d.arr.filter(r => r > 0).length / d.arr.length * 100) + '%' : '—'}</div>
    </div>`).join('')}</div>`;
}

    </div>
  </div>
  <div class="plan-section" style="margin-bottom:16px">
    <div class="plan-section-title" style="color:var(--blue)"><i class="ti ti-list-check" aria-hidden="true"></i> Reglas para esta semana</div>
    ${plan.reglas.map((r, i) => `<div class="plan-rule"><span class="plan-rule-icon" style="color:var(--blue);font-weight:700">${i + 1}.</span>${r}</div>`).join('')}
  </div>
  <div class="grid-2">
    <div class="plan-section">
      <div class="plan-section-title" style="color:var(--green)"><i class="ti ti-check" aria-hidden="true"></i> Setups permitidos</div>
      ${plan.setups_permitidos.map(s => `<div class="plan-rule"><span class="plan-rule-icon" style="color:var(--green)">›</span>${s}</div>`).join('')}
    </div>
    <div class="plan-section">
      <div class="plan-section-title" style="color:var(--red)"><i class="ti ti-ban" aria-hidden="true"></i> Comportamientos prohibidos</div>
      ${plan.comportamientos_prohibidos.map(s => `<div class="plan-rule"><span class="plan-rule-icon" style="color:var(--red)">✗</span>${s}</div>`).join('')}
    </div>
  </div>`;
}

// ── Config Page ──────────────────────────────────────
function renderConfig() {
  document.getElementById('main-content').innerHTML = `
  <div style="margin-bottom:20px">
    <h1 style="font-size:20px;font-weight:700">Configuración</h1>
    <p style="color:var(--text2);font-size:13px;margin-top:2px">Personaliza tu journal</p>
  </div>
  <div class="grid-2">
    <div>
      <div class="card" style="margin-bottom:16px">
        <div class="card-header"><span class="card-title">API Key (Anthropic)</span></div>
        <p style="font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.6">Opcional. Sin API key la IA funciona en modo local. Con tu API key obtendrás análisis más precisos.</p>
        <div class="form-group">
          <input type="password" class="form-input" id="api-key-input" placeholder="sk-ant-..." value="${state.apiKey}">
        </div>
        <button class="btn btn-primary" onclick="saveApiKey()">
          <i class="ti ti-check" aria-hidden="true"></i> Guardar API Key
        </button>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">Datos</span></div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-ghost" onclick="exportData()"><i class="ti ti-download" aria-hidden="true"></i> Exportar JSON</button>
          <button class="btn btn-danger btn-sm" onclick="resetData()"><i class="ti ti-trash" aria-hidden="true"></i> Borrar todo</button>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">Checklist Personalizable</span>
        <button class="btn btn-ghost btn-sm" onclick="addCheckItem()"><i class="ti ti-plus" aria-hidden="true"></i></button>
      </div>
      <div id="checklist-config">${renderChecklistConfig()}</div>
    </div>
  </div>`;
}

function renderChecklistConfig() {
  return state.checklist.map(c => `
  <div class="check-item">
    <div class="check-box ${c.active ? 'checked' : ''}" onclick="toggleCheckConfig(${c.id})">
      ${c.active ? '<i class="ti ti-check" style="font-size:12px;color:#080c0f" aria-hidden="true"></i>' : ''}
    </div>
    <input type="text" value="${c.label}" onchange="updateCheckLabel(${c.id}, this.value)"
      style="flex:1;background:transparent;border:none;color:var(--text);font-family:Space Grotesk,sans-serif;font-size:13px;outline:none">
    <button onclick="removeCheckItem(${c.id})" style="background:none;border:none;color:var(--text3);cursor:pointer;padding:2px 4px">
      <i class="ti ti-x" aria-hidden="true"></i>
    </button>
  </div>`).join('');
}

function toggleCheckConfig(id) {
  const c = state.checklist.find(x => x.id === id);
  if (c) c.active = !c.active;
  saveState();
  document.getElementById('checklist-config').innerHTML = renderChecklistConfig();
}

function updateCheckLabel(id, val) {
  const c = state.checklist.find(x => x.id === id);
  if (c) c.label = val;
  saveState();
}

function addCheckItem() {
  state.checklist.push({ id: Date.now(), label: 'Nuevo check', active: true });
  saveState();
  document.getElementById('checklist-config').innerHTML = renderChecklistConfig();
}

function removeCheckItem(id) {
  state.checklist = state.checklist.filter(c => c.id !== id);
  saveState();
  document.getElementById('checklist-config').innerHTML = renderChecklistConfig();
}

function saveApiKey() {
  state.apiKey = document.getElementById('api-key-input').value.trim();
  saveState();
  showToast('API Key guardada correctamente', 'success');
}

function exportData() {
  const blob = new Blob([JSON.stringify(state.trades, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'edgeflow_trades.json';
  a.click();
}

function resetData() {
  if (confirm('¿Seguro que quieres borrar todos los datos? Esta acción es irreversible.')) {
    state.trades = [];
    state.weeklyPlan = null;
    saveState();
    showPage(state.currentPage);
    showToast('Datos eliminados');
  }
}

// ── Utils ────────────────────────────────────────────
function closeModal(id) {
  const m = document.getElementById(id);
  if (m) m.remove();
}

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = type === 'success' ? 'var(--green)' : type === 'warn' ? 'var(--amber)' : 'var(--border2)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Init ─────────────────────────────────────────────
loadState();
addDemoTrades();
showPage('dashboard');
</script>

</body>
</html>
